<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0f0}
.app{display:flex;flex-direction:column;height:100%}
.topbar{background:#1a1a2e;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(108,99,255,0.15);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#8b83ff;flex:1}
.topbar .icon-btn{background:none;border:none;color:#8b83ff;font-size:18px;padding:6px;cursor:pointer}
.model-sel{background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:4px 8px;color:#e0e0f0;font-size:11px;outline:none;max-width:120px}
.content{flex:1;overflow:hidden;position:relative}
.panel{display:none;flex-direction:column;height:100%;overflow:hidden}
.panel.active{display:flex}
.bottom-bar{display:flex;background:#1a1a2e;border-top:1px solid rgba(108,99,255,0.15);flex-shrink:0;height:50px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8888aa;border-top:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab.active{color:#8b83ff;border-top-color:#6c63ff}
.tab-icon{font-size:18px;line-height:1}
.tab-label{font-size:9px;margin-top:1px}

/* Common */
.card{background:#1a1a2e;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid rgba(108,99,255,0.1);font-size:12px}
.badge{display:inline-block;padding:2px 6px;border-radius:99px;font-size:9px;font-weight:600}
.badge-ok{background:rgba(74,222,128,0.2);color:#4ade80}
.badge-pending{background:rgba(250,204,21,0.2);color:#facc15}
.badge-err{background:rgba(248,113,113,0.2);color:#f87171}
.badge-info{background:rgba(96,165,250,0.2);color:#60a5fa}
.info-row{display:flex;font-size:11px;padding:1px 0}
.info-l{color:#8888aa;min-width:50px;flex-shrink:0}
.btn-sm{background:none;border:1px solid rgba(108,99,255,0.3);color:#8b83ff;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer}
.btn-sm:active{background:rgba(108,99,255,0.15)}
.btn-primary{background:#6c63ff;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}
.empty{text-align:center;padding:30px 20px;color:#8888aa;font-size:12px}
.loading{text-align:center;padding:20px;color:#8888aa;font-size:12px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px}
.prompt-box{background:rgba(0,0,0,0.3);border-radius:6px;padding:6px 8px;font-size:11px;color:#b0b0d0;white-space:pre-wrap;word-break:break-word;max-height:50px;overflow:hidden;cursor:pointer;line-height:1.4}
.prompt-box.expanded{max-height:none}

/* Chat */
.msg{margin-bottom:10px;max-width:88%}
.msg.user{margin-left:auto}
.msg-role{font-size:9px;color:#8888aa;padding:0 4px;margin-bottom:2px}
.msg-bubble{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.user .msg-bubble{background:#6c63ff;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:#1a1a2e;border:1px solid rgba(108,99,255,0.1);border-bottom-left-radius:4px}
.msg-bubble code{background:rgba(0,0,0,0.4);padding:1px 4px;border-radius:3px;font-family:'SF Mono','Fira Code',monospace;font-size:11px}
.msg-bubble pre{background:rgba(0,0,0,0.4);border-radius:6px;padding:8px;margin:6px 0;overflow-x:auto;position:relative}
.msg-bubble pre code{background:none;padding:0;font-size:10px;line-height:1.4;display:block}
.msg-bubble strong{color:#8b83ff}
.msg-bubble blockquote{border-left:3px solid rgba(108,99,255,0.4);padding-left:8px;margin:6px 0;color:#a0a0c0}
.typing{display:none;padding:0 10px;margin-bottom:8px}.typing.show{display:block}
.typing-dots{display:inline-flex;gap:3px;padding:8px 12px;background:#1a1a2e;border-radius:12px;border:1px solid rgba(108,99,255,0.1)}
.typing-dot{width:5px;height:5px;background:#8b83ff;border-radius:50%;animation:bk .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.15s}.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bk{to{opacity:.3;transform:translateY(-2px)}}
.input-area{flex-shrink:0;background:#1a1a2e;border-top:1px solid rgba(108,99,255,0.15);padding:6px 10px;display:flex;gap:6px;align-items:flex-end}
.input-area textarea{flex:1;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:8px;padding:8px 10px;color:#e0e0f0;font-size:13px;outline:none;resize:none;max-height:100px;line-height:1.4;font-family:inherit}
.input-area textarea:focus{border-color:#6c63ff}
.send-btn{background:#6c63ff;border:none;color:#fff;border-radius:50%;width:34px;height:34px;font-size:15px;cursor:pointer;flex-shrink:0}
.send-btn:disabled{opacity:.4}

/* Search */
.search-bar{display:flex;gap:6px;margin-bottom:8px}
.search-bar input{flex:1;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:8px 10px;color:#e0e0f0;font-size:12px;outline:none}

/* Modal */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modal-body{background:#1a1a2e;border-radius:14px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;padding:16px;border:1px solid rgba(108,99,255,0.2)}
.modal-body h2{font-size:15px;font-weight:700;margin-bottom:12px;color:#8b83ff}
.modal-body label{font-size:11px;color:#8888aa;display:block;margin-bottom:3px;margin-top:10px}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:8px;color:#e0e0f0;font-size:12px;outline:none}
.modal-body .btn-row{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.btn-cancel{background:#16213e;color:#8888aa;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer}

/* Image */
.img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.img-item{background:#1a1a2e;border-radius:8px;border:1px solid rgba(108,99,255,0.1);overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.img-item img{width:100%;height:100%;object-fit:cover}
.img-item .placeholder{color:#8888aa;font-size:30px}
.img-bar{flex-shrink:0;padding:8px 10px;display:flex;gap:6px}
.img-bar input{flex:1;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:8px 10px;color:#e0e0f0;font-size:12px;outline:none}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#16213e;color:#e0e0f0;padding:8px 14px;border-radius:8px;font-size:11px;z-index:300;border:1px solid rgba(108,99,255,0.3);display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1 id="topTitle">💬 聊天</h1>
    <select class="model-sel" id="modelSelect" onchange="changeModel()" style="display:none"></select>
    <button class="icon-btn" onclick="openSettings()" id="topBtn">⚙️</button>
  </div>
  <div class="content" id="contentArea">
    <!-- Chat Panel -->
    <div class="panel active" id="panelChat">
      <div class="scroll" id="messages">
        <div class="empty" id="emptyChat" style="padding:50px"><p>💬</p><p style="margin-top:8px">选择模型开始对话<br>点击 ⚙️ 配置 API Key</p></div>
      </div>
      <div class="typing" id="typing"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
      <div class="input-area">
        <textarea id="chatInput" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
      </div>
    </div>
    <!-- Tasks Panel -->
    <div class="panel" id="panelTasks">
      <div class="scroll" id="tasksContent"><div class="loading">加载中...</div></div>
    </div>
    <!-- Memory Panel -->
    <div class="panel" id="panelMemory">
      <div class="scroll" id="memoryContent"><div class="loading">加载中...</div></div>
    </div>
    <!-- Image Panel -->
    <div class="panel" id="panelImage">
      <div class="img-bar">
        <input id="imgPrompt" placeholder="描述要生成的图片..." onkeydown="if(event.key==='Enter')genImage()">
        <button class="btn-primary" onclick="genImage()" style="padding:8px 12px">🎨</button>
      </div>
      <div class="scroll" id="imageContent"><div class="empty" style="padding:40px"><p style="font-size:28px">🎨</p><p style="margin-top:8px">输入描述生成图片</p></div></div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="tab active" data-tab="chat" onclick="switchTab('chat')"><span class="tab-icon">💬</span><span class="tab-label">聊天</span></div>
    <div class="tab" data-tab="tasks" onclick="switchTab('tasks')"><span class="tab-icon">📅</span><span class="tab-label">任务</span></div>
    <div class="tab" data-tab="memory" onclick="switchTab('memory')"><span class="tab-icon">🧠</span><span class="tab-label">记忆</span></div>
    <div class="tab" data-tab="image" onclick="switchTab('image')"><span class="tab-icon">🎨</span><span class="tab-label">图片</span></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-body">
    <h2>⚙️ 设置</h2>
    <label>模型</label>
    <select id="setModel"><option value="deepseek|deepseek-chat">DeepSeek Chat</option><option value="deepseek|deepseek-coder">DeepSeek Coder</option><option value="xiaomi|mimo-v2.5-pro">MiMo Pro</option><option value="custom|自定义">自定义</option></select>
    <label>API Key <span style="color:#f87171">*</span></label><input id="setKey" type="password" placeholder="sk-...">
    <label>Base URL <span style="color:#8888aa">（自定义时必填）</span></label><input id="setUrl" placeholder="https://api.example.com/v1">
    <label>系统提示词</label><textarea id="setSys" style="min-height:40px;resize:vertical" placeholder="可选..."></textarea>
    <div class="btn-row"><button class="btn-cancel" onclick="closeModal('settingsModal')">取消</button><button class="btn-primary" onclick="saveSettings()">保存</button></div>
  </div>
</div>

<!-- Task Create Modal -->
<div class="modal" id="taskModal">
  <div class="modal-body">
    <h2>➕ 新建定时任务</h2>
    <label>名称</label><input id="taskName" placeholder="任务名">
    <label>命令 <span style="color:#f87171">*</span></label><textarea id="taskPrompt" style="min-height:60px" placeholder="给 Hermes 的指令..."></textarea>
    <label>间隔</label><select id="taskSched"><option value="30m">30分钟</option><option value="1h">1小时</option><option value="3h">3小时</option><option value="6h">6小时</option><option value="1d" selected>每天</option></select>
    <label>投递</label><select id="taskDeliver"><option value="telegram">Telegram</option><option value="qqbot">QQ Bot</option><option value="local">本地</option></select>
    <div class="btn-row"><button class="btn-cancel" onclick="closeModal('taskModal')">取消</button><button class="btn-primary" onclick="createTask()">创建</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
var S = {
  convs: [], curConv: null, model: 'deepseek|deepseek-chat',
  models: {
    'deepseek|deepseek-chat': {name:'DeepSeek Chat',url:'https://api.deepseek.com/v1/chat/completions',key:''},
    'deepseek|deepseek-coder': {name:'DeepSeek Coder',url:'https://api.deepseek.com/v1/chat/completions',key:''},
    'xiaomi|mimo-v2.5-pro': {name:'MiMo Pro',url:'https://openrouter.ai/api/v1/chat/completions',key:''},
    'custom|自定义': {name:'自定义',url:'',key:''}
  },
  sysPrompt: '', images: []
};

function save(){try{localStorage.setItem('aip',JSON.stringify({convs:S.convs,curConv:S.curConv,model:S.model,models:S.models,sysPrompt:S.sysPrompt,images:S.images}))}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem('aip'));if(d){if(d.convs)S.convs=d.convs;if(d.curConv)S.curConv=d.curConv;if(d.model)S.model=d.model;if(d.models)for(var k in d.models)if(S.models[k]){S.models[k].key=d.models[k].key||'';S.models[k].url=d.models[k].url||''}if(d.models&&d.models['custom|自定义'])S.models['custom|自定义']=d.models['custom|自定义'];if(d.sysPrompt)S.sysPrompt=d.sysPrompt;if(d.images)S.images=d.images}}catch(e){}}

// ===== Tab =====
var titles={chat:'💬 聊天',tasks:'📅 任务',memory:'🧠 记忆',image:'🎨 图片'};
function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(e){e.classList.remove('active')});
  document.querySelector('.tab[data-tab="'+t+'"]').classList.add('active');
  document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  document.getElementById('topTitle').textContent=titles[t]||'';
  var ms=document.getElementById('modelSelect');
  ms.style.display=t==='chat'?'inline-block':'none';
  if(t==='tasks')loadTasks();
  if(t==='memory')loadMemory();
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ===== Chat =====
function renderModelSelect(){var s=document.getElementById('modelSelect');s.innerHTML='';for(var k in S.models){var o=document.createElement('option');o.value=k;o.textContent=S.models[k].name;if(k===S.model)o.selected=true;s.appendChild(o)}s.onchange=function(){S.model=s.value;save()}}
function changeModel(){S.model=document.getElementById('modelSelect').value;save()}
function getConv(){return S.convs.find(function(c){return c.id===S.curConv})}
function renderConvList(){} // no sidebar needed, just use messages

function renderMessages(){
  var el=document.getElementById('messages'),empty=document.getElementById('emptyChat');
  var conv=getConv();
  if(!conv||conv.messages.length===0){el.innerHTML='';el.appendChild(empty);empty.style.display='block';document.getElementById('sendBtn').disabled=true;return}
  empty.style.display='none';
  var h='';for(var i=0;i<conv.messages.length;i++){var m=conv.messages[i];var role=m.role==='user'?'user':'assistant';h+='<div class="msg '+role+'"><div class="msg-role">'+(role==='user'?'你':'AI')+'</div><div class="msg-bubble">'+renderMd(m.content)+'</div></div>'}
  el.innerHTML=h+el.innerHTML.indexOf('emptyChat')>=0?'':el.innerHTML;
  el.innerHTML=h;
  // re-append empty
  el.appendChild(empty);
  empty.style.display='none';
  document.getElementById('sendBtn').disabled=false;
  el.scrollTop=el.scrollHeight;
}
function renderMd(t){if(!t)return'';var h=esc(t);
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/~~(.+?)~~/g,'<del>$1</del>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^### (.+)$/gm,'<b style="color:#8b83ff">$1</b>');
  h=h.replace(/^## (.+)$/gm,'<b style="color:#8b83ff;font-size:14px">$1</b>');
  h=h.replace(/^# (.+)$/gm,'<b style="color:#8b83ff;font-size:16px">$1</b>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:#60a5fa">$1</a>');
  h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');
  return '<p>'+h+'</p>';
}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function sendMsg(){
  var inp=document.getElementById('chatInput'),txt=inp.value.trim();if(!txt)return;
  if(!S.curConv){S.curConv=Date.now().toString(36);S.convs.unshift({id:S.curConv,title:txt.substring(0,20),model:S.model,messages:[],ts:Date.now()})}
  var conv=getConv();conv.messages.push({role:'user',content:txt});conv.ts=Date.now();
  if(conv.messages.length===1)conv.title=txt.substring(0,30);
  save();renderMessages();inp.value='';inp.style.height='auto';
  var m=S.models[S.model];
  if(!m.key){conv.messages.push({role:'assistant',content:'⚠️ 请先配置 API Key（⚙️）'});save();renderMessages();return}
  showTyping(true);
  try{
    var msgs=[{role:'user',content:txt}];
    if(S.sysPrompt)msgs.unshift({role:'system',content:S.sysPrompt});
    for(var i=0;i<Math.max(0,conv.messages.length-1);i++){
      var old=conv.messages[i];
      if(old.role==='assistant'||old.role==='user')msgs.push({role:old.role,content:old.content});
    }
    // keep last 20 messages
    if(msgs.length>22)msgs=msgs.slice(-22);
    var res=await fetch(m.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+m.key},body:JSON.stringify({model:S.model.split('|')[1],messages:msgs,temperature:0.7})});
    var data=await res.json();showTyping(false);
    if(data.error)conv.messages.push({role:'assistant',content:'❌ '+(data.error.message||JSON.stringify(data.error))});
    else if(data.choices&&data.choices[0])conv.messages.push({role:'assistant',content:data.choices[0].message.content||'[空]'});
    else conv.messages.push({role:'assistant',content:'❌ 未知响应'});
  }catch(e){showTyping(false);conv.messages.push({role:'assistant',content:'❌ '+e.message})}
  conv.ts=Date.now();save();renderMessages();
}
function showTyping(s){document.getElementById('typing').classList.toggle('show',s);if(s)document.getElementById('messages').scrollTop=99999}

// ===== Tasks =====
async function loadTasks(){
  var el=document.getElementById('tasksContent');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    var cron=await(await fetch('/api/tasks/cron')).json();
    var todos=await(await fetch('/api/tasks/todos')).json();
    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:13px">🕐 定时任务 ('+((cron.jobs||[]).length)+')</b><button class="btn-sm" onclick="openModal(\'taskModal\')">➕ 新建</button></div>';
    (cron.jobs||[]).forEach(function(j){
      var st=j.last_status||'pending',en=j.enabled!==false;
      var bc=en?(st==='ok'?'badge-ok':st==='error'?'badge-err':'badge-pending'):'badge-info';
      var bt=en?(st==='ok'?'正常':'待运行'):'暂停';
      h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>'+esc(j.name)+'</b><span class="badge '+bc+'">'+bt+'</span></div>';
      h+='<div class="prompt-box" onclick="this.classList.toggle(\'expanded\')">'+esc(j.prompt||'')+'</div>';
      h+='<div class="info-row"><span class="info-l">调度</span>'+esc(j.schedule_display||'—')+'</div>';
      h+='<div class="info-row"><span class="info-l">投递</span>'+esc(j.deliver||'—')+'</div>';
      h+='<div style="margin-top:4px;display:flex;gap:4px"><button class="btn-sm" onclick="toggleCron(\''+j.id+'\','+(!en)+')">'+(en?'暂停':'启用')+'</button><button class="btn-sm" onclick="delCron(\''+j.id+'\')" style="color:#f87171;border-color:rgba(248,113,113,0.3)">删除</button></div></div>';
    });
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0 8px"><b style="font-size:13px">📋 待办 ('+((todos.todos||[]).length)+')</b></div>';
    h+='<div style="display:flex;gap:6px;margin-bottom:8px"><input id="todoInp" placeholder="新任务..." style="flex:1;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:6px 10px;color:#e0e0f0;font-size:12px;outline:none" onkeydown="if(event.key===\'Enter\')addTodo()"><button class="btn-primary" onclick="addTodo()" style="padding:6px 10px">+</button></div>';
    (todos.todos||[]).forEach(function(t){
      var done=t.status==='completed';
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(108,99,255,0.06)">';
      h+='<span style="cursor:pointer;font-size:14px" onclick="toggleTodo(\''+t.id+'\','+done+')">'+(done?'✅':'⬜')+'</span>';
      h+='<span style="flex:1;font-size:12px;'+(done?'text-decoration:line-through;color:#8888aa':'')+'">'+esc(t.content)+'</span>';
      h+='<span style="color:#f87171;font-size:12px;cursor:pointer;opacity:.5" onclick="delTodo(\''+t.id+'\')">✕</span></div>';
    });
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div class="empty">加载失败: '+e.message+'</div>'}
}
async function toggleCron(id,en){await fetch('/api/tasks/cron/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en})});loadTasks()}
async function delCron(id){if(!confirm('删除？'))return;await fetch('/api/tasks/cron/'+id,{method:'DELETE'});loadTasks()}
async function createTask(){
  var prompt=document.getElementById('taskPrompt').value.trim();if(!prompt){toast('命令不能为空');return}
  await fetch('/api/tasks/cron',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('taskName').value.trim(),prompt:prompt,schedule_display:document.getElementById('taskSched').value,deliver:document.getElementById('taskDeliver').value})});
  closeModal('taskModal');toast('✅ 已创建');loadTasks();
}
async function addTodo(){var v=document.getElementById('todoInp').value.trim();if(!v)return;await fetch('/api/tasks/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v})});loadTasks()}
async function toggleTodo(id,done){await fetch('/api/tasks/todos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:done?'pending':'completed'})});loadTasks()}
async function delTodo(id){await fetch('/api/tasks/todos/'+id,{method:'DELETE'});loadTasks()}

// ===== Memory =====
async function loadMemory(q){
  var el=document.getElementById('memoryContent');
  el.innerHTML='<div class="search-bar"><input id="memSearch" placeholder="搜索对话内容..." onkeydown="if(event.key===\'Enter\')searchMem()" style="flex:1;background:#16213e;border:1px solid rgba(108,99,255,0.2);border-radius:6px;padding:8px 10px;color:#e0e0f0;font-size:12px;outline:none"></div><div id="memResult"><div class="loading">加载中...</div></div>';
  try{
    var data=await(await fetch('/api/memory/sessions')).json();
    var sessions=data.sessions||[];
    var h='<b style="font-size:12px">最近对话 ('+sessions.length+')</b>';
    if(sessions.length===0)h+='<div class="empty">暂无对话记录</div>';
    sessions.forEach(function(s){
      var time=s.started_at?new Date(s.started_at).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
      h+='<div class="card" style="cursor:pointer" onclick="viewSession(\''+s.id+'\')"><div style="display:flex;justify-content:space-between"><b style="font-size:11px">'+esc(s.source||'未知')+'</b><span style="font-size:10px;color:#8888aa">'+time+'</span></div>';
      if(s.message_count)h+='<div style="font-size:10px;color:#8888aa;margin-top:2px">'+s.message_count+' 条消息 · '+(s.input_tokens||0)+' tokens</div></div>';
    });
    document.getElementById('memResult').innerHTML=h;
  }catch(e){document.getElementById('memResult').innerHTML='<div class="empty">加载失败</div>'}
}
async function searchMem(){
  var q=document.getElementById('memSearch').value.trim();if(!q||q.length<2)return;
  try{
    var data=await(await fetch('/api/memory/search?q='+encodeURIComponent(q))).json();
    var results=data.results||[];
    var h='<b style="font-size:12px">搜索结果 ('+results.length+')</b>';
    if(results.length===0)h+='<div class="empty">未找到匹配内容</div>';
    results.forEach(function(r){
      h+='<div class="card" onclick="viewSession(\''+r.session_id+'\')"><div style="font-size:10px;color:#8888aa">'+esc(r.role)+' · '+esc(r.timestamp||'')+'</div>';
      h+='<div style="font-size:11px;margin-top:2px">'+(r.snippet||esc(r.content||''))+'</div></div>';
    });
    document.getElementById('memResult').innerHTML=h;
  }catch(e){}
}
async function viewSession(id){
  try{
    var data=await(await fetch('/api/memory/sessions/'+id)).json();
    var el=document.getElementById('memResult');
    var h='<button class="btn-sm" onclick="loadMemory()" style="margin-bottom:8px">← 返回</button>';
    h+='<b style="font-size:12px">'+esc((data.session||{}).source||'会话')+'</b>';
    (data.messages||[]).forEach(function(m){
      var role=m.role==='user'?'你':m.role==='assistant'?'AI':m.role;
      var content=m.content||'';
      h+='<div style="margin-bottom:8px"><div style="font-size:9px;color:#8888aa;padding:0 4px">'+esc(role)+' · '+(m.tool_name?'🔧 '+esc(m.tool_name):'')+'</div>';
      h+='<div style="background:rgba(108,99,255,0.05);border-radius:8px;padding:6px 10px;font-size:11px;line-height:1.4;max-height:150px;overflow:hidden;cursor:pointer" onclick="this.style.maxHeight=\'none\'">'+esc(content)+'</div></div>';
    });
    el.innerHTML=h;
  }catch(e){}
}

// ===== Image =====
async function genImage(){
  var inp=document.getElementById('imgPrompt'),txt=inp.value.trim();if(!txt)return;
  var el=document.getElementById('imageContent');
  // For now, show placeholder - image gen needs specific API
  S.images.unshift({prompt:txt,url:'',status:'pending',ts:Date.now()});
  save();renderImages();
  toast('🎨 图片生成功能需要配置图像生成 API');
}
function renderImages(){
  var el=document.getElementById('imageContent');
  if(S.images.length===0){el.innerHTML='<div class="empty" style="padding:40px"><p style="font-size:28px">🎨</p><p style="margin-top:8px">输入描述生成图片</p></div>';return}
  var h='<div class="img-grid">';
  S.images.forEach(function(img){
    h+='<div class="img-item">';
    if(img.url)h+='<img src="'+img.url+'">';
    else h+='<div class="placeholder" style="font-size:11px;color:#8888aa;padding:8px;text-align:center">'+esc(img.prompt||'待生成')+'</div>';
    h+='</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

// ===== Settings =====
function openSettings(){
  var m=S.models[S.model]||{};
  document.getElementById('setModel').value=S.model;
  document.getElementById('setKey').value=m.key||'';
  document.getElementById('setUrl').value=m.url||'';
  document.getElementById('setSys').value=S.sysPrompt||'';
  openModal('settingsModal');
}
function openModal(id){document.getElementById(id).classList.add('open')}
function saveSettings(){
  var k=document.getElementById('setModel').value;
  var key=document.getElementById('setKey').value.trim();
  if(!key){toast('需要 API Key');return}
  S.model=k;S.models[k].key=key;
  if(k==='custom|自定义')S.models[k].url=document.getElementById('setUrl').value.trim();
  S.sysPrompt=document.getElementById('setSys').value.trim();
  save();renderModelSelect();closeModal('settingsModal');toast('✅ 已保存');
}

// ===== Init =====
document.addEventListener('DOMContentLoaded',function(){
  load();renderModelSelect();
  if(S.curConv)renderMessages();
  renderImages();
});
</script>
